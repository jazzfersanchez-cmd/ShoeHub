<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHOEHUB | Premium Footwear</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; scroll-behavior: smooth; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .shopee-orange { background: #ee4d2d; }
        .text-shopee { color: #ee4d2d; }
        .product-card:hover img { transform: scale(1.08); }
        .shopee-gradient { background: linear-gradient(135deg, #ee4d2d 0%, #ff7337 100%); }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="shopee-gradient text-white sticky top-0 z-50 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
            <h1 onclick="showPage('home')" class="text-2xl font-extrabold italic cursor-pointer tracking-tighter">
                SHOE<span class="bg-white text-shopee px-1 rounded ml-1 shadow-sm">HUB</span>
            </h1>
            
            <div class="hidden md:flex flex-1 max-w-2xl bg-white rounded-full p-1 shadow-inner">
                <input id="mainSearch" type="text" placeholder="Search for the hottest sneakers..." class="w-full px-5 py-2 text-black rounded-full focus:outline-none text-sm">
                <button class="bg-orange-600 text-white px-6 py-2 rounded-full hover:bg-black transition"><i class="fas fa-search"></i></button>
            </div>

            <div class="flex items-center gap-6">
                <div onclick="showPage('cart')" class="relative cursor-pointer group">
                    <i class="fas fa-shopping-bag text-2xl group-hover:shake transition"></i>
                    <span id="cart-badge" class="absolute -top-2 -right-3 bg-white text-shopee text-[10px] rounded-full h-5 w-5 flex items-center justify-center font-bold border-2 border-orange-600">0</span>
                </div>
                <button onclick="showPage('profile')" class="hover:opacity-80 transition"><i class="far fa-user-circle text-2xl"></i></button>
            </div>
        </div>
    </nav>

    <section id="page-home" class="page active">
        <div class="relative overflow-hidden bg-black text-white py-20 px-6 mb-12">
            <div class="absolute inset-0 opacity-40">
                <img src="https://images.unsplash.com/photo-1556906781-9a412961c28c?auto=format&fit=crop&w=1600&q=80" class="w-full h-full object-cover">
            </div>
            <div class="relative max-w-7xl mx-auto flex flex-col items-start gap-4">
                <span class="bg-shopee px-3 py-1 rounded text-xs font-bold tracking-widest">SUMMER DROP 2026</span>
                <h2 class="text-6xl font-black italic tracking-tighter">RUN THE STREETS.</h2>
                <p class="text-xl max-w-lg opacity-90">Engineered for comfort. Designed for the hype. Get 20% off your first order.</p>
                <button onclick="window.scrollTo(0, 600)" class="mt-4 bg-white text-black px-10 py-4 font-bold rounded-full hover:bg-shopee hover:text-white transition-all transform hover:scale-105 shadow-2xl">SHOP NOW</button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-4 md:grid-cols-8 gap-4 mb-12 text-center">
                <div class="group cursor-pointer">
                    <div class="w-16 h-16 mx-auto bg-white shadow-md rounded-2xl flex items-center justify-center text-shopee text-2xl group-hover:bg-shopee group-hover:text-white transition-all"><i class="fas fa-bolt"></i></div>
                    <p class="text-[10px] font-bold mt-2 uppercase">Flash Sale</p>
                </div>
                <div class="group cursor-pointer">
                    <div class="w-16 h-16 mx-auto bg-white shadow-md rounded-2xl flex items-center justify-center text-blue-500 text-2xl group-hover:bg-blue-500 group-hover:text-white transition-all"><i class="fas fa-star"></i></div>
                    <p class="text-[10px] font-bold mt-2 uppercase">New</p>
                </div>
                </div>

            <div class="flex items-center justify-between mb-8">
                <h3 class="text-2xl font-extrabold tracking-tight italic">DAILY SELECTIONS</h3>
                <div class="h-1 flex-1 mx-6 bg-gray-200 rounded"></div>
            </div>
            <div id="product-grid" class="grid grid-cols-2 lg:grid-cols-4 gap-6 pb-20">
                </div>
        </div>
    </section>

    <section id="page-detail" class="page">
        <div class="max-w-6xl mx-auto p-6 md:p-12">
            <button onclick="showPage('home')" class="mb-8 font-bold text-sm text-gray-400 hover:text-shopee"><i class="fas fa-arrow-left mr-2"></i> RETURN TO SHOP</button>
            <div class="bg-white rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row border border-gray-100">
                <div class="md:w-1/2 p-4">
                    <img id="d-img" class="w-full h-[500px] object-cover rounded-2xl" src="">
                </div>
                <div class="md:w-1/2 p-10 flex flex-col justify-center space-y-8">
                    <div>
                        <h2 id="d-title" class="text-4xl font-black mb-2 tracking-tight"></h2>
                        <div class="flex items-center gap-4">
                            <span id="d-price" class="text-3xl font-bold text-shopee"></span>
                            <span class="text-gray-300 line-through">$180.00</span>
                        </div>
                    </div>
                    <div>
                        <p class="font-bold text-xs uppercase tracking-widest text-gray-400 mb-4">Select Size (US)</p>
                        <div class="flex flex-wrap gap-3">
                            <button class="w-14 h-14 border-2 rounded-xl font-bold hover:border-shopee focus:bg-shopee focus:text-white transition-all">8</button>
                            <button class="w-14 h-14 border-2 rounded-xl font-bold hover:border-shopee focus:bg-shopee focus:text-white transition-all">9</button>
                            <button class="w-14 h-14 border-2 rounded-xl font-bold border-shopee bg-orange-50 text-shopee">10</button>
                            <button class="w-14 h-14 border-2 rounded-xl font-bold hover:border-shopee focus:bg-shopee focus:text-white transition-all">11</button>
                        </div>
                    </div>
                    <div class="pt-4">
                        <button onclick="handleAddToCart()" class="w-full bg-black text-white py-5 rounded-2xl font-bold text-xl hover:bg-shopee transition-all transform hover:-translate-y-1 shadow-xl uppercase">Add to Basket</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="page-cart" class="page pt-10 px-4">
        <div class="max-w-3xl mx-auto bg-white rounded-3xl shadow-2xl p-8 border border-gray-100">
            <h2 class="text-3xl font-black mb-8 italic tracking-tight">YOUR CART</h2>
            <div id="cart-list" class="space-y-6"></div>
            <div id="cart-summary" class="mt-10 pt-10 border-t flex items-center justify-between">
                <div>
                    <p class="text-gray-400 font-bold uppercase text-xs">Estimated Total</p>
                    <p id="cart-total" class="text-4xl font-black text-shopee">$0.00</p>
                </div>
                <button class="bg-black text-white px-12 py-4 rounded-2xl font-bold hover:bg-shopee transition-all">CHECKOUT</button>
            </div>
        </div>
    </section>

    <script>
        // DATABASE
        const shoes = [
            { id: 1, name: "Air Zoom Structure", price: 125.00, img: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600" },
            { id: 2, name: "Street Racer Pro", price: 89.00, img: "https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77?w=600" },
            { id: 3, name: "Midnight Jordan 1", price: 175.00, img: "https://images.unsplash.com/photo-1595950653106-6c9ebd614d3a?w=600" },
            { id: 4, name: "Neon Cloud Walker", price: 110.00, img: "https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=600" },
            { id: 5, name: "VaporMax Stealth", price: 210.00, img: "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=600" },
            { id: 6, name: "Classic Low Top", price: 65.00, img: "https://images.unsplash.com/photo-1560769629-975ec94e6a86?w=600" },
            { id: 7, name: "Electric Runner X", price: 140.00, img: "https://images.unsplash.com/photo-1605348532760-6753d2c43329?w=600" },
            { id: 8, name: "Retro Basketball", price: 155.00, img: "https://images.unsplash.com/photo-1551107696-a4b0c5a0d9a2?w=600" }
        ];

        let cart = [];
        let activeShoe = null;

        // ROUTER
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            window.scrollTo(0,0);
            if(pageId === 'cart') renderCart();
        }

        // SHOP UI
        function initShop() {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = shoes.map(s => `
                <div onclick="viewProduct(${s.id})" class="product-card group bg-white rounded-3xl p-3 border border-gray-100 hover:border-shopee transition-all cursor-pointer">
                    <div class="overflow-hidden rounded-2xl h-60 md:h-72 mb-4 bg-gray-50">
                        <img src="${s.img}" class="w-full h-full object-cover transition-transform duration-500">
                    </div>
                    <div class="px-2 pb-2">
                        <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Premium Edition</span>
                        <h4 class="font-bold text-gray-800 text-lg leading-tight mt-1 truncate">${s.name}</h4>
                        <div class="flex items-center justify-between mt-3">
                            <p class="text-shopee font-extrabold text-xl">$${s.price.toFixed(2)}</p>
                            <span class="text-[10px] bg-gray-100 px-2 py-1 rounded text-gray-500">4.9 ★</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // PRODUCT DETAIL
        function viewProduct(id) {
            activeShoe = shoes.find(s => s.id === id);
            document.getElementById('d-title').innerText = activeShoe.name;
            document.getElementById('d-price').innerText = `$${activeShoe.price.toFixed(2)}`;
            document.getElementById('d-img').src = activeShoe.img;
            showPage('detail');
        }

        // CART UI
        function handleAddToCart() {
            cart.push(activeShoe);
            document.getElementById('cart-badge').innerText = cart.length;
            showPage('cart');
        }

        function renderCart() {
            const list = document.getElementById('cart-list');
            if(cart.length === 0) {
                list.innerHTML = `<div class="text-center py-20 text-gray-300 font-bold tracking-widest uppercase italic">Your bag is empty</div>`;
                document.getElementById('cart-total').innerText = "$0.00";
                return;
            }
            let total = 0;
            list.innerHTML = cart.map((item, idx) => {
                total += item.price;
                return `
                    <div class="flex items-center gap-6 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                        <img src="${item.img}" class="w-24 h-24 object-cover rounded-xl shadow-lg">
                        <div class="flex-1">
                            <h5 class="font-black italic text-lg uppercase">${item.name}</h5>
                            <p class="text-shopee font-bold">$${item.price.toFixed(2)}</p>
                        </div>
                        <button onclick="removeFromCart(${idx})" class="w-10 h-10 rounded-full bg-white text-gray-300 hover:text-red-500 shadow-sm transition-all"><i class="fas fa-trash"></i></button>
                    </div>
                `;
            }).join('');
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
        }

        function removeFromCart(idx) {
            cart.splice(idx, 1);
            document.getElementById('cart-badge').innerText = cart.length;
            renderCart();
        }

        // BOOTSTRAP
        initShop();
    </script>
</body>
</html>
